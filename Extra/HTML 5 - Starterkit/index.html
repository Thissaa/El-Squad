<head>
  <meta charset="UTF-8" />

  <meta name="description" content="Spotify Trends - Ontdek de populairste nummers en artiesten van dit moment" />
  <title>Spotify Trends - Home</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />

<body>
  <div class="container mt-4 text-center">
    <a href="https://accounts.spotify.com/authorize?client_id=1410b74a1389410889838e31ea870d09&response_type=token&redirect_uri=http://127.0.0.1:5500/callback.html&scope=user-top-read" class="btn btn-success">
      Inloggen met Spotify
    </a>
  </div>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
  const token = localStorage.getItem("spotify_access_token");

  if (!token) {
    console.log("Nog niet ingelogd bij Spotify");
    return;
  }

  fetch("https://api.spotify.com/v1/me/top/artists?limit=10", {
    headers: {
      Authorization: "Bearer " + token
    }
  })
    .then(res => res.json())
    .then(data => {
      console.log("Top artiesten:", data);
      // TODO: HTML genereren met artiesten
    })
    .catch(err => {
      console.error("Fout bij ophalen top artiesten:", err);
    });
});

  </script>
  
  <nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center" href="./index.html">

        Spotify
      </a>

      <div class="collapse navbar-collapse" id="navbarText">

          <li class="nav-item"><a class="nav-link" href="./top-nummers.html">Nummer</a></li>
          <li class="nav-item"><a class="nav-link" href="./genres.html">Genres</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="flex-grow-1">
    <div class="py-4 text-center text-white" style="background-color: #1DB954;">
      <div class="container">
        <h1 class="h2 mb-2">Welkom bij Spotify Trends</h1>
        <p class="mb-0">Ontdek de populairste muziek en artiesten van dit moment.</p>
      </div>
    </div>
